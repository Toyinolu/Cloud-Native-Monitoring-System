apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    uid: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: cloud-monitor
      defaultBucket: metrics
    secureJsonData:
      token: my-super-secret-token
    isDefault: true
    editable: true
